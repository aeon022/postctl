<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <rect width="128" height="128" rx="28" fill="#13141c" stroke="#252636" stroke-width="3"/>
  <!-- Terminal cursor > -->
  <path d="M28 40 L52 56 L28 72" stroke="url(#purpleGlow)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Terminal cursor _ -->
  <line x1="56" y1="72" x2="78" y2="72" stroke="url(#blueGlow)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Sharing Node Symbol -->
  <g transform="translate(80, 56)" filter="url(#glow)">
    <circle cx="12" cy="-18" r="8" fill="#00d2ff"/>
    <circle cx="-12" cy="0" r="8" fill="#a855f7"/>
    <circle cx="12" cy="18" r="8" fill="#00d2ff"/>
    <line x1="-6" y1="-3" x2="6" y2="-15" stroke="#a855f7" stroke-width="4"/>
    <line x1="-6" y1="3" x2="6" y2="15" stroke="#a855f7" stroke-width="4"/>
  </g>
  <defs>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
